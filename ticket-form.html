body {

.app {

/* Screenshot */
.main-img {

}

/* Transparent inputs */
select, input {
  position: absolute;

  border: none;

}

/* Counter */
.counter {
  position: absolute;

  gap: 10px;

}

.counter button {
  padding: 10px 15px;

}

/* Bus type */
.type {

}

.type button {

  background: white;

}

.type button.active {

  color: white;
  border: none;
}

/* Top info */
.topText {
  position: absolute;
  color: white;
  font-size: 14px;
  font-weight: 500;
}

<script>

function formatDateTime(date){

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let d = date.getDate().toString().padStart(2, "0");
  let m = months[date.getMonth()];
  let y = date.getFullYear().toString().slice(-2);

  let hours = date.getHours();
  let minutes = date.getMinutes().toString().padStart(2, "0");

  let ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  if(hours === 0) hours = 12;

  hours = hours.toString().padStart(2, "0");

  return `${d} ${m}, ${y} | ${hours}:${minutes} ${ampm}`;
}

// ================= GLOBAL VARIABLES =================
let count = 1;
let busType = "Non-AC";

// ================= COUNT =================
function changeCount(x){

  let current = parseInt(document.getElementById("count").innerText);

  current += x;

  if(current < 1) current = 1;
  if(current > 3) current = 3;

  document.getElementById("count").innerText = current;

  count = current;

  updateFare();
}

// ================= FARE =================
function updateFare(){

  let base = parseFloat(document.getElementById("fare").value);

  let total = base * count;

  // store total internally
  document.getElementById("fare").dataset.total = total;
}

// ================= LOAD DATA =================
let booking = JSON.parse(localStorage.getItem("bookingData")) || {};

// Date & Time
let now = new Date();
document.getElementById("dateTime").innerText =
  now.toLocaleDateString() + " | " + now.toLocaleTimeString();

// Bus number
document.getElementById("busNumber").innerText =
  "DL " + (booking.bus || "----");

// Route
document.getElementById("routeText").innerText =
  booking.route || booking.bus || "----";

// Towards
document.getElementById("towardsText").innerText =
  booking.towards ? "towards " + booking.towards : "";

// ================= BUS TYPE =================
function setType(type){

  busType = type;

  document.getElementById("acBtn").classList.remove("active");
  document.getElementById("nonacBtn").classList.remove("active");

  if(type === "AC"){
    document.getElementById("acBtn").classList.add("active");
  } else {
    document.getElementById("nonacBtn").classList.add("active");
  }
}

// Default selection
document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("nonacBtn").classList.add("active");
  document.getElementById("fare").addEventListener("change", updateFare);
});

// ================= AUTOCOMPLETE =================

setupAutocomplete("fromStop", "fromSuggestions");
setupAutocomplete("toStop", "toSuggestions");

function setupAutocomplete(inputId, suggestionId){

  let input = document.getElementById(inputId);
  let suggestionBox = document.getElementById(suggestionId);

  input.addEventListener("input", function(){

    let value = this.value.toLowerCase();

    suggestionBox.innerHTML = "";

    if(!value) return;

    let filtered = stops.filter(stop =>
      stop.toLowerCase().includes(value)
    );

    filtered.slice(0, 8).forEach(stop => {

      let item = document.createElement("div");

      item.innerText = stop;

      item.style.padding = "10px";
      item.style.cursor = "pointer";
      item.style.borderBottom = "1px solid #eee";

      item.onclick = () => {
        input.value = stop;
        suggestionBox.innerHTML = "";
      };

      suggestionBox.appendChild(item);

    });

  });

}
  
// ================= BUY =================
function buyTicket(){

  let from = document.getElementById("fromStop").value;
  let to = document.getElementById("toStop").value;
  let baseFare = parseFloat(document.getElementById("fare").value);
let totalFare = baseFare * count;

  let towards = booking.towards || "";

  if(!from || !to){
    alert("Select stops");
    return;
  }

  let now = new Date();

let ticket = {
  bus: "DL " + (booking.bus || ""),
  route: booking.route || "",
  towards: booking.towards || "",
  from: from,
  to: to,
  fare: totalFare,
  baseFare: baseFare,
  count: count,
  busType: busType,
  dateTime: formatDateTime(now),   // ✅ NEW FORMAT
  id: "TKT" + Date.now()
};

  // Save multiple tickets
  let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
  tickets.push(ticket);

  localStorage.setItem("tickets", JSON.stringify(tickets));

  // Save latest
  localStorage.setItem("ticket", JSON.stringify(ticket));

  if(busType === "AC"){
  window.location.href = "ticket-view-ac.html";
} else {
  window.location.href = "ticket-view-nonac.html";
}
}
