<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Details</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

.app {
  max-width: 420px;
  margin: auto;
  position: relative;
}

/* Screenshot */
.main-img {
  width: 100%;
  display: block;
}

/* Transparent inputs */
select, input {
  position: absolute;
  background: transparent;
  border: none;
  outline: none;
  font-size: 16px;
  color: black;
}

/* Counter */
.counter {
  position: absolute;
  display: flex;
  gap: 10px;
  align-items: center;
}

.counter button {
  padding: 10px 15px;
  border: 1px solid #ccc;
  background: white;
}

/* Bus type */
.type {
  position: absolute;
}

.type button {
  margin-right: 10px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

.type button.active {
  background: #2aa7a9;
  color: white;
  border: none;
}

/* Top info */
.topText {
  position: absolute;
  color: white;
  font-size: 14px;
  font-weight: 500;
}

</style>
</head>

<body>

<div class="app">

  <!-- SCREENSHOT -->
  <img src="images/ticket-template.png" class="main-img">

  <!-- ================= TOP BAR ================= -->

  <div id="dateTime"
       class="topText"
       style="top:85px; left:30px;">
  </div>

  <div id="busNumber"
       class="topText"
       style="top:85px; right:35px;">
  </div>

  <!-- ROUTE NUMBER -->
  <div id="routeText"
       style="position:absolute; top:155px; left:92px; font-size:25px; font-weight:400;">
  </div>
  
<div id="towardsText"
     style="
       position:absolute;
       top:185px;
       left:95px;
       font-size:13px;
       color:#666;
     ">
</div>
       
  <!-- ================= INPUTS ================= -->

  <!-- START -->
  <select id="fromStop"
          style="top:295px; left:80px; width:260px;">
    <option value="">Select Start</option>
    <option>Harswaroop Colony</option>
    <option>Stop A</option>
    <option>Stop B</option>
  </select>

  <!-- END -->
  <select id="toStop"
          style="top:367px; left:80px; width:260px;">
    <option value="">Select End</option>
    <option>Bhati Mines</option>
    <option>Stop C</option>
    <option>Stop D</option>
  </select>

  <!-- COUNT -->
  <div class="counter"
       style="top:460px; right:42px;">
    <button onclick="changeCount(-1)">-</button>
    <span id="count">1</span>
    <button onclick="changeCount(1)">+</button>
  </div>

  <!-- BUS TYPE -->
  <div class="type" style="top:515px; right:25px;">
  <button id="acBtn" onclick="setType('AC')">AC</button>
  <button id="nonacBtn" onclick="setType('Non-AC')">Non-AC</button>
</div>

  <!-- FARE  -->
<select id="fare"
        style="
          position:absolute;
          top:597px;
          left:330px;
          width:100px;
          font-size:18px;
          font-weight:600;
          background:transparent;
        ">
  <option value="5">₹5</option>
  <option value="10">₹10</option>
  <option value="15">₹15</option>
  <option value="20">₹20</option>
  <option value="25">₹25</option>
</select>

  <!-- PAY BUTTON -->
  <div style="position:absolute; bottom:20px; left:20px; width:380px; height:60px;"
       onclick="buyTicket()">
  </div>

</div>

<script>

// ================= GLOBAL VARIABLES =================
let count = 1;
let busType = "Non-AC";

// ================= COUNT =================
function changeCount(x){

  let current = parseInt(document.getElementById("count").innerText);

  current += x;

  if(current < 1) current = 1;
  if(current > 3) current = 3;

  document.getElementById("count").innerText = current;

  count = current;

  updateFare();
}

// ================= FARE =================
function updateFare(){

  let base = parseFloat(document.getElementById("fare").value);

  let total = base * count;

  // store total internally
  document.getElementById("fare").dataset.total = total;
}

// ================= LOAD DATA =================
let booking = JSON.parse(localStorage.getItem("bookingData")) || {};

// Date & Time
let now = new Date();
document.getElementById("dateTime").innerText =
  now.toLocaleDateString() + " | " + now.toLocaleTimeString();

// Bus number
document.getElementById("busNumber").innerText =
  "DL " + (booking.bus || "----");

// Route
document.getElementById("routeText").innerText =
  booking.route || booking.bus || "----";

// Towards
document.getElementById("towardsText").innerText =
  booking.towards ? "towards " + booking.towards : "";

// ================= BUS TYPE =================
function setType(type){

  busType = type;

  document.getElementById("acBtn").classList.remove("active");
  document.getElementById("nonacBtn").classList.remove("active");

  if(type === "AC"){
    document.getElementById("acBtn").classList.add("active");
  } else {
    document.getElementById("nonacBtn").classList.add("active");
  }
}

// Default selection
document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("nonacBtn").classList.add("active");
  document.getElementById("fare").addEventListener("change", updateFare);
});

// ================= BUY =================
function buyTicket(){

  let from = document.getElementById("fromStop").value;
  let to = document.getElementById("toStop").value;
  let baseFare = parseFloat(document.getElementById("fare").value);
let totalFare = baseFare * count;

  let towards = booking.towards || "";

  if(!from || !to){
    alert("Select stops");
    return;
  }

  let ticket = {
  bus: "DL " + (booking.bus || ""),
  route: booking.route || "",
  towards: booking.towards || "",
  from: from,
  to: to,
  fare: totalFare,      // total
  baseFare: baseFare,   // per ticket
  count: count,
  busType: busType,
  date: new Date().toLocaleDateString(),
  time: new Date().toLocaleTimeString(),
  id: "TKT" + Date.now()
};

  // Save multiple tickets
  let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
  tickets.push(ticket);

  localStorage.setItem("tickets", JSON.stringify(tickets));

  // Save latest
  localStorage.setItem("ticket", JSON.stringify(ticket));

  if(busType === "AC"){
  window.location.href = "ticket-view-ac.html";
} else {
  window.location.href = "ticket-view-nonac.html";
}
}

</script>
