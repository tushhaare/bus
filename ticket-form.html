<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Details</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

.app {
  max-width: 420px;
  margin: auto;
  position: relative;
}

/* Screenshot */
.main-img {
  width: 100%;
  display: block;
}

/* Transparent inputs */
select, input {
  position: absolute;
  background: transparent;
  border: none;
  outline: none;
  font-size: 16px;
  color: black;
}

/* Counter */
.counter {
  position: absolute;
  display: flex;
  gap: 10px;
  align-items: center;
}

.counter button {
  padding: 10px 15px;
  border: 1px solid #ccc;
  background: white;
}

/* Bus type */
.type {
  position: absolute;
}

.type button {
  margin-right: 10px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

.type button.active {
  background: #2aa7a9;
  color: white;
  border: none;
}

/* Top info */
.topText {
  position: absolute;
  color: white;
  font-size: 14px;
  font-weight: 500;
}

</style>
</head>

<body>

<div class="app">

  <!-- SCREENSHOT -->
  <img src="images/ticket-template.png" class="main-img">

  <!-- ================= TOP BAR ================= -->

  <div id="dateTime"
       class="topText"
       style="top:80px; left:30px;">
  </div>

  <div id="busNumber"
       class="topText"
       style="top:80px; right:30px;">
  </div>

  <!-- ROUTE NUMBER -->
  <div id="routeText"
       style="position:absolute; top:145px; left:84px; font-size:23px; font-weight:400;">
  </div>
  
<div id="towardsText"
     style="
       position:absolute;
       top:172px;
       left:86px;
       font-size:13px;
       color:#666;
     ">
</div>
       
  <!-- ================= INPUTS ================= -->

  <!-- START -->
 <!-- START -->
<div style="position:absolute; top:267px; left:70px; width:260px;">

  <input
    id="fromStop"
    placeholder="Starting stop"
    autocomplete="off"
    style="
      width:100%;
      font-size:18px;
      background:transparent;
      border:none;
      outline:none;
    "
  >

  <div id="fromSuggestions"
       style="
         background:white;
         border-radius:10px;
         margin-top:5px;
         max-height:120px;
         overflow-y:auto;
         font-size:14px;
         box-shadow:0 2px 8px rgba(0,0,0,0.15);
       ">
  </div>

</div>


<!-- END -->
<div style="position:absolute; top:332px; left:70px; width:260px;">

  <input
    id="toStop"
    placeholder="Ending stop"
    autocomplete="off"
    style="
      width:100%;
      font-size:18px;
      background:transparent;
      border:none;
      outline:none;
    "
  >

  <div id="toSuggestions"
       style="
         background:white;
         border-radius:10px;
         margin-top:5px;
         max-height:120px;
         overflow-y:auto;
         font-size:14px;
         box-shadow:0 2px 8px rgba(0,0,0,0.15);
       ">
  </div>

</div>


  <!-- COUNT -->
  <div class="counter"
       style="top:412px; right:27.5px;">
    <button onclick="changeCount(-1)">-</button>
    <span id="count">1</span>
    <button onclick="changeCount(1)">+</button>
  </div>

  <!-- BUS TYPE -->
  <div class="type" style="top:468px; right:20px;">
  <button id="acBtn" onclick="setType('AC')">AC</button>
  <button id="nonacBtn" onclick="setType('Non-AC')">Non-AC</button>
</div>

  <!-- FARE  -->
<select id="fare"
        style="
          position:absolute;
          top:547px;
          left:320px;
          width:120px;
          font-size:20px;
          font-weight:600;
          background:transparent;
        ">
  <option value="5">₹5</option>
  <option value="10">₹10</option>
  <option value="15">₹15</option>
  <option value="20">₹20</option>
  <option value="25">₹25</option>
</select>

  <!-- PAY BUTTON -->
  <div style="position:absolute; bottom:20px; left:20px; width:380px; height:60px;"
       onclick="buyTicket()">
  </div>

</div>

<script>

function formatDateTime(date){

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let d = date.getDate().toString().padStart(2, "0");
  let m = months[date.getMonth()];
  let y = date.getFullYear().toString().slice(-2);

  let hours = date.getHours();
  let minutes = date.getMinutes().toString().padStart(2, "0");

  let ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  if(hours === 0) hours = 12;

  hours = hours.toString().padStart(2, "0");

  return `${d} ${m}, ${y} | ${hours}:${minutes} ${ampm}`;
}

// ================= GLOBAL VARIABLES =================
let count = 1;
let busType = "Non-AC";

// ================= COUNT =================
function changeCount(x){

  let current = parseInt(document.getElementById("count").innerText);

  current += x;

  if(current < 1) current = 1;
  if(current > 3) current = 3;

  document.getElementById("count").innerText = current;

  count = current;

  updateFare();
}

// ================= FARE =================
function updateFare(){

  let base = parseFloat(document.getElementById("fare").value);

  let total = base * count;

  // store total internally
  document.getElementById("fare").dataset.total = total;
}

// ================= LOAD DATA =================
let booking = JSON.parse(localStorage.getItem("bookingData")) || {};

// Date & Time
let now = new Date();
document.getElementById("dateTime").innerText =
  now.toLocaleDateString() + " | " + now.toLocaleTimeString();

// Bus number
document.getElementById("busNumber").innerText =
  "DL " + (booking.bus || "----");

// Route
document.getElementById("routeText").innerText =
  booking.route || booking.bus || "----";

// Towards
document.getElementById("towardsText").innerText =
  booking.towards ? "towards " + booking.towards : "";

// ================= BUS TYPE =================
function setType(type){

  busType = type;

  document.getElementById("acBtn").classList.remove("active");
  document.getElementById("nonacBtn").classList.remove("active");

  if(type === "AC"){
    document.getElementById("acBtn").classList.add("active");
  } else {
    document.getElementById("nonacBtn").classList.add("active");
  }
}

// Default selection
document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("nonacBtn").classList.add("active");
  document.getElementById("fare").addEventListener("change", updateFare);
});

// ================= STOPS =================

const stops = [

"A.I.I.M.S.",
"AIIMS Ring Road",
"Airforce Station NICF",
"Ambedkar Colony",
"Ambedkar Nagar Depot",
"Anand Vihar ISBT (Viveka Nand ISBT)",
"Andrews Ganj",
"Ashram",
"Aya Nagar",
"Azadpur Terminal",
"Badarpur",
"Bhatti Mines",
"Chhatarpur",
"Dhaula Kuan",
"Ghitorni",
"Hamdard Nagar",
"Harswaroop Colony",
"Hauzrani",
"ISBT / Kashmiri Gate",
"Jasola Vihar",
"Kalka Ji",
"Kashmiri Gate",
"Lajpat Nagar",
"Mehrauli Terminal",
"Nehru Place Terminal",
"Qutub Minar Metro Station",
"Rajouri Garden",
"Saket",
"Saket Metro Sation",
"Sarita Vihar",
"South Extension",
"Tughlakabad Village"

];


// ================= AUTOCOMPLETE =================

setupAutocomplete("fromStop", "fromSuggestions");
setupAutocomplete("toStop", "toSuggestions");

function setupAutocomplete(inputId, suggestionId){

  let input = document.getElementById(inputId);
  let suggestionBox = document.getElementById(suggestionId);

  input.addEventListener("input", function(){

    let value = this.value.toLowerCase();

    suggestionBox.innerHTML = "";

    if(!value) return;

    let filtered = stops.filter(stop =>
      stop.toLowerCase().includes(value)
    );

    filtered.slice(0, 8).forEach(stop => {

      let item = document.createElement("div");

      item.innerText = stop;

      item.style.padding = "10px";
      item.style.cursor = "pointer";
      item.style.borderBottom = "1px solid #eee";

      item.onclick = () => {
        input.value = stop;
        suggestionBox.innerHTML = "";
      };

      suggestionBox.appendChild(item);

    });

  });

}
  
// ================= BUY =================
function buyTicket(){

  let from = document.getElementById("fromStop").value;
  let to = document.getElementById("toStop").value;
  let baseFare = parseFloat(document.getElementById("fare").value);
let totalFare = baseFare * count;

  let towards = booking.towards || "";

  if(!from || !to){
    alert("Select stops");
    return;
  }

  let now = new Date();

let ticket = {
  bus: "DL " + (booking.bus || ""),
  route: booking.route || "",
  towards: booking.towards || "",
  from: from,
  to: to,
  fare: totalFare,
  baseFare: baseFare,
  count: count,
  busType: busType,
  dateTime: formatDateTime(now),   // ✅ NEW FORMAT
  id: "TKT" + Date.now()
};

  // Save multiple tickets
  let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
  tickets.push(ticket);

  localStorage.setItem("tickets", JSON.stringify(tickets));

  // Save latest
  localStorage.setItem("ticket", JSON.stringify(ticket));

  if(busType === "AC"){
  window.location.href = "ticket-view-ac.html";
} else {
  window.location.href = "ticket-view-nonac.html";
}
}

</script>
