<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Bookings</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f5f5;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: 600;
}

.tabs {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  font-size: 13px;
  color: #777;
}

.tabs div.active {
  color: black;
  border-bottom: 2px solid #2aa7a9;
  padding-bottom: 6px;
}

.section-title {
  margin-top: 20px;
  font-size: 20px;
  font-weight: 600;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 18px;
  margin-top: 12px;
  border: 1px solid #eee;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.route-badge {
  background: #dbeafe;
  color: #1e40af;
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: 600;
}

.fare {
  font-size: 20px;
  font-weight: 700;
}

.stop {
  margin-top: 14px;
  font-size: 18px;
}

.arrow {
  margin: 5px 0;
  color: #999;
}

.btn {
  margin-top: 15px;
  border: 1px solid #90caf9;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.empty {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
  text-align: center;
  color: #777;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">← All Bookings</div>

  <div class="tabs">
    <div class="active">RECENT</div>
    <div>BUS TICKET</div>
    <div>BUS PASS</div>
    <div>METRO TICKET</div>
  </div>

  <div class="section-title">Bus Ticket</div>

  <div id="ticketContainer"></div>

  <div class="section-title">Metro Ticket</div>
  <div class="empty">Click to see past metro tickets.</div>

  <div class="section-title">Bus Pass</div>
  <div class="empty">Click to see past bus pass.</div>

</div>

<script>

// Get latest ticket
let t = JSON.parse(localStorage.getItem("ticket"));

const fareMap = {
  5: 4.62,
  10: 9.25,
  15: 13.75,
  20: 18.35,
  25: 22.79
};

let container = document.getElementById("ticketContainer");

if(!t){
  container.innerHTML = "<div class='empty'>No tickets found</div>";
}
else {

  let count = parseInt(t.count) || 1;
  let totalFare = parseFloat(t.fare);

  let actualPer = totalFare / count;
  let discountedPer = fareMap[actualPer] || actualPer;
  let discountedTotal = discountedPer * count;

  container.innerHTML = `
    <div class="card">

      <div class="top">
        <div class="route-badge">Route ${t.route}</div>
        <div class="fare">₹${discountedTotal.toFixed(2)}</div>
      </div>

      <div class="stop">🟢 ${t.from}</div>
      <div class="arrow">↓</div>
      <div class="stop">🔴 ${t.to}</div>

      <div class="btn" id="viewBtn">View Ticket</div>

    </div>
  `;

  // attach click
  document.getElementById("viewBtn").onclick = () => {
    openTicket(t);
  };
}

// Open ticket
function openTicket(ticket){

  localStorage.setItem("ticket", JSON.stringify(ticket));

  if(ticket.busType === "AC"){
    window.location.href = "ticket-view-ac.html";
  } else {
    window.location.href = "ticket-view-nonac.html";
  }
}

</script>

</body>
</html>
