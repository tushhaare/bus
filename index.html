<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E Chartr</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: #e9e9e9;
}

.app {
  max-width: 420px;
  margin: auto;
  background: #f6f6f6;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* HEADER */
.header {
  background: #e4d8c6;
  padding: 14px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 600;
  font-size: 18px;
  color: #2d4f8f;
}

.wallet {
  display: flex;
  align-items: center;
  gap: 10px;
}

.wallet span {
  background: #fff;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 13px;
}

/* SEARCH */
.search {
  margin-top: 12px;
  background: #fff;
  border-radius: 30px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
}

.search input {
  border: none;
  outline: none;
  width: 100%;
  font-size: 14px;
  margin-left: 8px;
}

/* SECTION TITLE */
.section {
  padding: 14px 14px 6px;
  font-size: 11px;
  color: #8a8a8a;
  letter-spacing: 0.5px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px 12px;
}

/* CARD EXACT STYLE */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 14px;
  height: 85px;
  position: relative;
  box-shadow: 0 2px 5px rgba(0,0,0,0.08);
  cursor: pointer;
}

.card h4 {
  font-size: 13px;
  margin: 0;
  font-weight: 600;
}

.card i {
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 24px;
  color: #8b8b8b;
}

/* LIST */
.list {
  background: #fff;
  margin: 0 12px;
  border-radius: 14px;
  overflow: hidden;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.item:last-child {
  border-bottom: none;
}

.item-left {
  display: flex;
  gap: 10px;
}

.item-left i {
  color: green;
  font-size: 18px;
}

/* BUTTON */
.main-btn {
  margin: 12px;
  padding: 14px;
  width: calc(100% - 24px);
  border: none;
  background: #3d6cc6;
  color: white;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
}

/* BANNER */
.banner {
  margin: 12px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
}

.banner img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.banner-text {
  position: absolute;
  top: 12px;
  left: 12px;
  color: white;
  font-size: 14px;
  font-weight: 600;
}

/* NAVBAR */
.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: #fff;
  display: flex;
  justify-content: space-around;
  padding: 6px 0;
  border-top: 1px solid #ddd;
}

.nav button {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 10px;
  color: #8a8a8a;
}

.nav i {
  font-size: 20px;
  margin-bottom: 2px;
}

.nav .active {
  color: #3d6cc6;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <div class="topbar">
    <div class="logo">E Chartr</div>
    <div class="wallet">
      <span>₹0.0</span>
      <i class="ri-user-line"></i>
    </div>
  </div>

  <div class="search">
    <i class="ri-map-pin-line"></i>
    <input placeholder="Where are you going?">
    <i class="ri-search-line"></i>
  </div>
</div>

<div class="section">YOUR TRAVEL KIT</div>

<div class="grid">
  <div class="card"><h4>Bus Tickets</h4><i class="ri-bus-line"></i></div>
  <div class="card"><h4>Metro Ticket</h4><i class="ri-train-line"></i></div>
  <div class="card"><h4>Bus Pass</h4><i class="ri-ticket-line"></i></div>
  <div class="card"><h4>Route Info</h4><i class="ri-map-line"></i></div>
  <div class="card"><h4>All Services</h4><i class="ri-apps-line"></i></div>
</div>

<div class="section">AROUND YOU</div>

<div class="list">
  <div class="item">
    <div class="item-left">
      <i class="ri-bus-line"></i>
      <div>
        <strong>Harswaroop Colony</strong><br>
        <small>Towards Fatehpur Beri</small>
      </div>
    </div>
    <span>118m</span>
  </div>
</div>

<button class="main-btn">Show all nearby stops</button>

<div class="section">FEATURED FOR YOU</div>

<div class="banner">
  <img src="https://images.unsplash.com/photo-1589394815804-964ed0be2eb5">
  <div class="banner-text">Metro Ticket Available 🎉</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <button class="active"><i class="ri-home-5-line"></i>Home</button>
  <button><i class="ri-map-pin-line"></i>Nearby</button>
  <button><i class="ri-ticket-line"></i>Ticket</button>
  <button><i class="ri-question-line"></i>Help</button>
</div>

</div>

<script>
function openPage(pageId){
  document.querySelectorAll('.page, #homePage').forEach(p=>{
    p.classList.remove('active-page');
  });
  document.getElementById(pageId).classList.add('active-page');
}

function switchTab(btn,page){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  openPage(page);
}
</script>

</body>
</html>
