<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticketing App</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
}

.app {
  max-width: 420px;
  margin: auto;
  position: relative;
  min-height: 100vh;
}

/* Screens */
.screen {
  display: none;
  position: relative;
  padding-bottom: 80px;
}

.screen.active {
  display: block;
}

.main-img {
  width: 100%;
  display: block;
  position: relative;
  z-index: 1;
}

/* Overlay inputs */
.box {
  width: 45px;
  height: 45px;
  text-align: center;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ccc;
  background: transparent;
}

.route-input {
  position: absolute;
  height: 45px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  font-size: 16px;
  background: transparent;
  outline: none;
}

/* Click areas */
.click {
  position: absolute;
  cursor: pointer;
  z-index: 500;

}

/* Navbar */
.navbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  z-index: 100;
}

.navbar img {
  width: 100%;
}

.nav-click {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: 70px;
  z-index: 200;
}

.nav-btn {
  position: absolute;
  width: 25%;
  height: 100%;
}

/* DEBUG */
/*
.click, .nav-btn {
  background: rgba(255,0,0,0.3);
}
*/
</style>
</head>

<body>

<div class="app">

  <!-- ================= HOME ================= -->
  <div id="home" class="screen active">
    <img src="images/home.png" class="main-img">

    <div class="click" style="top:180px; left:15px; width:120px; height:120px;" onclick="go('busEntry')"></div>
  </div>


  <!-- ================= BUS ENTRY SCREEN ================= -->
  <div id="busEntry" class="screen">
    <img src="images/bus-entry.png" class="main-img">

    <!-- Bus number boxes -->
    <div style="position:absolute; top:260px; left:60px; display:flex; gap:15px;">
      <input class="box" maxlength="1" id="b1">
      <input class="box" maxlength="1" id="b2">
      <input class="box" maxlength="1" id="b3">
      <input class="box" maxlength="1" id="b4">
    </div>

    <!-- Route input -->
    <input id="routeInput" class="route-input"
           placeholder="e.g. 534"
           style="top:480px; left:25px; width:370px;">

    <!-- Click areas -->
    <div class="click" style="top:220px; left:10px; width:400px; height:200px;" onclick="submitBus()"></div>
    <div class="click" style="top:460px; left:10px; width:400px; height:180px;" onclick="submitRoute()"></div>
  </div>


  <!-- ================= NEXT STEP (STOPS SELECTION) ================= -->
  <div id="ticketForm" class="screen">
    <img src="images/ticket-form.png" class="main-img">

    <!-- FROM DROPDOWN -->
    <select id="fromStop"
            style="position:absolute; top:220px; left:20px; width:170px; height:40px;">
      <option>Select From</option>
      <option>Stop A</option>
      <option>Stop B</option>
    </select>

    <!-- TO DROPDOWN -->
    <select id="toStop"
            style="position:absolute; top:220px; right:20px; width:170px; height:40px;">
      <option>Select To</option>
      <option>Stop C</option>
      <option>Stop D</option>
    </select>

    <!-- BUY BUTTON -->
    <div class="click"
         style="top:300px; left:20px; width:380px; height:60px;"
         onclick="buyTicket()">
    </div>

  </div>


  <!-- ================= TICKET VIEW ================= -->
  <div id="ticketView" class="screen">
    <img src="images/ticket-view.png" class="main-img">

    <div id="ticketData"
         style="position:absolute; top:200px; left:20px; color:black;">
    </div>
  </div>

</div>


<!-- NAVBAR -->
<div class="navbar">
  <img src="images/navbar.png">
</div>

<div class="nav-click">
  <div class="nav-btn" style="left:0%" onclick="go('home')"></div>
  <div class="nav-btn" style="left:25%" onclick="alert('Nearby')"></div>
  <div class="nav-btn" style="left:50%" onclick="go('ticketView')"></div>
  <div class="nav-btn" style="left:75%" onclick="alert('Help')"></div>
</div>


<script>
// Navigation
function go(page){
  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });
  document.getElementById(page).classList.add("active");
}


// Auto move cursor
["b1","b2","b3","b4"].forEach((id,i,arr)=>{
  document.getElementById(id).addEventListener("input",function(){
    if(this.value && i<3){
      document.getElementById(arr[i+1]).focus();
    }
  });
});


// Submit Bus
function submitBus(){
  let bus =
    b1.value + b2.value + b3.value + b4.value;

  if(bus.length<4){
    alert("Enter full bus number");
    return;
  }

  localStorage.setItem("bookingData", JSON.stringify({
    type:"bus",
    value:bus
  }));

  go("ticketForm");
}


// Submit Route
function submitRoute(){
  let route = routeInput.value;

  if(!route){
    alert("Enter route");
    return;
  }

  localStorage.setItem("bookingData", JSON.stringify({
    type:"route",
    value:route
  }));

  go("ticketForm");
}


// Buy Ticket
function buyTicket(){

  let from = document.getElementById("fromStop").value;
  let to = document.getElementById("toStop").value;

  if(from==="Select From" || to==="Select To"){
    alert("Select stops");
    return;
  }

  let booking = JSON.parse(localStorage.getItem("bookingData"));

  let ticket = {
    bus: booking.value,
    from: from,
    to: to,
    fare: 20,
    time: new Date().toLocaleString(),
    id: "TKT"+Date.now()
  };

  localStorage.setItem("ticket", JSON.stringify(ticket));

  loadTicket();
  go("ticketView");
}


// Load Ticket
function loadTicket(){
  let t = JSON.parse(localStorage.getItem("ticket"));

  if(!t) return;

  document.getElementById("ticketData").innerHTML = `
    <b>Bus:</b> ${t.bus}<br>
    <b>From:</b> ${t.from}<br>
    <b>To:</b> ${t.to}<br>
    <b>Fare:</b> ₹${t.fare}<br>
    <b>Time:</b> ${t.time}<br>
    <b>ID:</b> ${t.id}<br>
    <img src="images/qr.png" width="120">
  `;
}
</script>

</body>
</html>
