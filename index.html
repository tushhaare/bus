<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home</title>

<style>
body {
  margin: 0;
  background: black;
}

/* Main container */
.app {
  max-width: 420px;
  margin: auto;
  position: relative;
}

/* Wrapper for image + clicks */
.wrapper {
  position: relative;
}

/* Screenshot */
.wrapper img {
  width: 100%;
  display: block;
}

/* Click areas */
.click {
  position: absolute;
  z-index: 5;
  cursor: pointer;
}

/* Navbar */
.navbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  z-index: 10;
  pointer-events: none;
}

.navbar img {
  width: 100%;
}

/* Nav buttons */
.nav-btn {
  position: fixed;
  bottom: 0;
  height: 70px;
  width: 25%;
  z-index: 20;
  pointer-events: auto;
}

.nav1 { left: 0%; }
.nav2 { left: 10%; }
.nav3 { left: 45.40%; }
.nav4 { left: 75%; }

/* DEBUG (TURN ON IF NEEDED) */
/*
.click, .nav-btn {
  background: rgba(255,0,0,0.3);
}
*/
</style>
</head>

<body>

<div class="app">

  <div class="wrapper">
    <img src="images/home.png">

    <!-- BUS BUTTON -->
    <div class="click"
     style="top:260px; left:20px; width:160px; height:140px;"
     onclick="window.location.href='bus-entry.html';">
</div>

  </div>

</div>

<!-- NAVBAR -->
<div class="navbar">
  <img src="images/navbar.png">
</div>

<div class="nav-btn nav1" onclick="alert('Home')"></div>
<div class="nav-btn nav2" onclick="alert('Nearby')"></div>
<div class="nav-btn nav3" onclick="window.location.href='tickets.html'"></div>
<div class="nav-btn nav4" onclick="alert('Help')"></div>

</body>
</html>
