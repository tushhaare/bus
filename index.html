<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticketing App</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
}

/* App container */
.app {
  max-width: 420px;
  margin: auto;
  position: relative;
  min-height: 100vh;
}

/* Screens */
.screen {
  display: none;
  height: 100%;
  overflow-y: auto;
  position: relative;
   padding-bottom: 80px;
}

.screen.active {
  display: block;
}

/* Main images */
.main-img {
  width: 100%;
  display: block;
}

/* Click areas */
.click {
  position: absolute;
  cursor: pointer;
}

/* Fixed Navbar Image */
.navbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  z-index: 1000;
}

.navbar img {
  width: 100%;
  display: block;
}

/* Navbar Click Layer */
.nav-click {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: 70px;
  z-index: 2000;
}

.nav-btn {
  position: absolute;
  width: 25%;
  height: 100%;
}

/* DEBUG MODE */
/*
.click, .nav-btn {
  background: rgba(255,0,0,0.3);
}
*/

</style>
</head>

<body>

<div class="app">

  <!-- HOME SCREEN -->
  <div id="home" class="screen active">
    <img src="images/home.png" class="main-img">

    <!-- Travel Kit -->
    <div class="click" style="top:260px; left:15px; width:170px; height:100px;" onclick="go('bus')"></div>
    <div class="click" style="top:260px; right:15px; width:170px; height:100px;" onclick="go('metro')"></div>

    <div class="click" style="top:380px; left:15px; width:170px; height:100px;" onclick="alert('Bus Pass')"></div>
    <div class="click" style="top:380px; right:15px; width:170px; height:100px;" onclick="alert('Route Info')"></div>

    <!-- Nearby Button -->
    <div class="click" style="top:520px; left:15px; width:390px; height:50px;" onclick="alert('Nearby Stops')"></div>
  </div>

  <!-- METRO SCREEN -->
  <div id="metro" class="screen">
    <img src="images/metro.png" class="main-img">

    <!-- Back -->
    <div class="click" style="top:20px; left:10px; width:60px; height:60px;" onclick="go('home')"></div>
  </div>

  <!-- BUS SCREEN -->
  <div id="bus" class="screen">
    <img src="images/bus.png" class="main-img">

    <!-- Back -->
    <div class="click" style="top:20px; left:10px; width:60px; height:60px;" onclick="go('home')"></div>

    <!-- Book Ticket -->
    <div class="click" style="bottom:140px; left:20px; width:380px; height:60px;" onclick="alert('Ticket Booked')"></div>
  </div>

  <!-- FIXED NAVBAR -->
  <div class="navbar">
    <img src="images/navbar.png">
  </div>

  <!-- NAV CLICK OVERLAY -->
  <div class="nav-click">
    <div class="nav-btn" style="left:0%" onclick="go('home')"></div>
    <div class="nav-btn" style="left:25%" onclick="alert('Nearby')"></div>
    <div class="nav-btn" style="left:50%" onclick="go('bus')"></div>
    <div class="nav-btn" style="left:75%" onclick="alert('Help')"></div>
  </div>

</div>

<script>
function go(page) {
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.remove("active");
  });

  document.getElementById(page).classList.add("active");
}
</script>

</body>
</html>
